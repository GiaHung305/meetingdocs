{% extends "base.html" %}

{% block title %}Đăng nhập | Meeting Docs{% endblock %}

{% block content %}
<section class="surface auth-card">
    <div class="surface-header text-center">
        <h1 class="h4 mb-1">Đăng nhập</h1>
    </div>
    <div class="surface-body">
        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label" for="{{ form.username.id_for_label }}">Tên tài khoản</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label" for="{{ form.password.id_for_label }}">Mật khẩu</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i data-lucide="log-in" width="18" height="18"></i>
                Đăng nhập
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/register/">Chưa có tài khoản? Đăng ký</a>
        </div>
    </div>
</section>
{% endblock %}
