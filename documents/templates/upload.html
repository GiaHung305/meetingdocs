{% extends "base.html" %}

{% block title %}Upload tài liệu | Meeting Docs{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <div class="page-kicker">Tài liệu mới</div>
        <h1 class="h3 mb-1">Upload tài liệu</h1>
        <div class="text-muted-strong">Tài liệu sẽ chờ admin duyệt trước khi hiển thị công khai.</div>
    </div>
    <a href="/" class="btn btn-outline-secondary">
        <i data-lucide="arrow-left" width="18" height="18"></i>
        Quay lại
    </a>
</section>

<section class="surface auth-card">
    <div class="surface-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary w-100" type="submit">
                <i data-lucide="upload-cloud" width="18" height="18"></i>
                Upload
            </button>
        </form>
    </div>
</section>
{% endblock %}
