{% extends "base.html" %}

{% block title %}Xóa tài liệu | Meeting Docs{% endblock %}

{% block content %}
<section class="surface auth-card">
    <div class="surface-header text-center">
        <h1 class="h4 mb-1">Xóa tài liệu</h1>
        <div class="text-muted-strong">Thao tác này không thể hoàn tác.</div>
    </div>
    <div class="surface-body">
        <p class="mb-4">
            Bạn có chắc muốn xóa <strong>{{ doc.title }}</strong>?
        </p>

        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <a href="/my-documents/" class="btn btn-outline-secondary flex-fill">
                <i data-lucide="arrow-left" width="18" height="18"></i>
                Hủy
            </a>
            <button type="submit" class="btn btn-danger flex-fill">
                <i data-lucide="trash-2" width="18" height="18"></i>
                Xóa
            </button>
        </form>
    </div>
</section>
{% endblock %}
