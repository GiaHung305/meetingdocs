<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Meeting Docs{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --app-bg: #f4f7fb;
            --app-ink: #172033;
            --app-muted: #667085;
            --app-line: #d9e2ec;
            --app-primary: #2563eb;
            --app-primary-dark: #1d4ed8;
            --app-success: #16a34a;
            --app-warning: #d97706;
            --app-danger: #dc2626;
        }

        body {
            min-height: 100vh;
            background: var(--app-bg);
            color: var(--app-ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app-shell {
            min-height: 100vh;
        }

        .app-nav {
            background: #ffffff;
            border-bottom: 1px solid var(--app-line);
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--app-primary);
            color: #ffffff;
        }

        .page-header {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .page-kicker {
            color: var(--app-muted);
            font-size: .9rem;
            margin-bottom: .25rem;
        }

        .surface {
            background: #ffffff;
            border: 1px solid var(--app-line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, .06);
        }

        .surface-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--app-line);
        }

        .surface-body {
            padding: 1.25rem;
        }

        .stat-card {
            background: #ffffff;
            border: 1px solid var(--app-line);
            border-radius: 8px;
            padding: 1rem;
            height: 100%;
        }

        .stat-label {
            color: var(--app-muted);
            font-size: .85rem;
            margin-bottom: .35rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f8fafc;
            color: #475467;
            font-size: .78rem;
            letter-spacing: .02em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--app-line);
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .btn {
            border-radius: 7px;
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            justify-content: center;
        }

        .btn-primary {
            background: var(--app-primary);
            border-color: var(--app-primary);
        }

        .btn-primary:hover {
            background: var(--app-primary-dark);
            border-color: var(--app-primary-dark);
        }

        .icon-btn {
            width: 2rem;
            height: 2rem;
            padding: 0;
        }

        .auth-card {
            max-width: 440px;
            margin: 3rem auto;
        }

        .form-control {
            border-radius: 7px;
            border-color: var(--app-line);
            padding: .65rem .8rem;
        }

        .auth-card input[type="text"],
        .auth-card input[type="password"] {
            width: 100%;
            border: 1px solid var(--app-line);
            border-radius: 7px;
            padding: .65rem .8rem;
        }

        .form-control:focus {
            border-color: var(--app-primary);
            box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .12);
        }

        .auth-card input[type="text"]:focus,
        .auth-card input[type="password"]:focus {
            border-color: var(--app-primary);
            box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .12);
            outline: none;
        }

        .surface-body form p {
            margin-bottom: 1rem;
        }

        .surface-body form p label {
            display: block;
            font-weight: 500;
            margin-bottom: .4rem;
        }

        .errorlist {
            color: var(--app-danger);
            font-size: .875rem;
            list-style: none;
            margin: .35rem 0 0;
            padding: 0;
        }

        .empty-state {
            padding: 2.5rem 1rem;
            text-align: center;
            color: var(--app-muted);
        }

        .document-preview {
            min-height: 420px;
            max-height: 640px;
            overflow: auto;
            background: #ffffff;
            border: 1px solid var(--app-line);
            border-radius: 8px;
            padding: 1.25rem;
            white-space: pre-wrap;
        }

        .document-frame {
            width: 100%;
            min-height: 640px;
            border: 1px solid var(--app-line);
            border-radius: 8px;
            background: #ffffff;
        }

        .image-preview {
            max-width: 100%;
            max-height: 640px;
            object-fit: contain;
            border: 1px solid var(--app-line);
            border-radius: 8px;
            background: #ffffff;
        }

        .text-muted-strong {
            color: var(--app-muted);
        }

        @media (max-width: 767.98px) {
            .page-header {
                align-items: stretch;
                flex-direction: column;
            }

            .page-header .btn,
            .page-header form,
            .page-header a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg app-nav">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="/">
                <span class="brand-mark"><i data-lucide="file-text" width="20" height="20"></i></span>
                Meeting Docs
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">

                    {% if user.is_authenticated %}
                        <a class="nav-link" href="/my-documents/">Tài liệu của tôi</a>

                        {% if user.is_superuser %}
                            <a class="btn btn-sm btn-outline-warning" href="/dashboard/">
                                <i data-lucide="layout-dashboard" width="16" height="16"></i>
                                Dashboard
                            </a>
                        {% endif %}

                        <form action="/logout/" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i data-lucide="log-out" width="16" height="16"></i>
                                Đăng xuất
                            </button>
                        </form>
                    {% else %}
                        <a class="btn btn-sm btn-outline-primary" href="/login/">Đăng nhập</a>
                        <a class="btn btn-sm btn-primary" href="/register/">Đăng ký</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        {% include "messages.html" %}
        {% block content %}{% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
    if (window.lucide) {
        lucide.createIcons();
    }
</script>
</body>
</html>
